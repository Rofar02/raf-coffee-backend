# Статика меню + прокси к FastAPI (имя сервиса в docker-compose: backend)
# Внешне: 8080:80 — nginx в контейнере слушает 80. absolute_redirect off — иначе
# при Host с портом редиректы могли давать Location без :8080.
# X-Real-IP / Host — см. proxy_set_header ниже (Starlette, редиректы API).
server {
    listen 80;
    absolute_redirect off;
    server_name localhost 127.0.0.1;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;

    # JSON-меню: GET /api/menu/ — полный путь к upstream, без /api/ в proxy_pass
    # (иначе nginx иначе нормализует URI и маршрут на FastAPI может не совпасть)
    # ^~ — взять этот префикс в приоритете, чтобы /api/... не обрабатывал location /
    # (try_files → index.html) и не перехватывали «лишние» regex-локации.
    location ^~ /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # Страницы без .html
    location = /menu {
        add_header Cache-Control "no-store" always;
        try_files /menu.html =404;
    }
    location = /menu/ {
        return 301 /menu;
    }
    location = /menu.html {
        return 301 /menu;
    }
    location = /admin {
        add_header Cache-Control "no-store" always;
        try_files /admin.html =404;
    }
    location = /admin/ {
        return 301 /admin;
    }
    location = /admin.html {
        return 301 /admin;
    }

    # Только API /admin/... — не /admin (статика) и не /admin.html
    location ^~ /admin/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    location = /ping {
        proxy_pass http://backend:8000/ping;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    location /docs {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    location /openapi.json {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    location /redoc {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # Видео/картинки, отдаваемые FastAPI из backend/static
    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    # На телефонах браузер часто кэширует HTML/CSS слишком агрессивно.
    # Для главной и основного CSS отключаем кэш, чтобы изменения сразу приезжали.
    location = /index.html {
        return 301 /;
    }

    location = /dist/styles.css {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        expires -1;
        try_files $uri =404;
    }

    # Главная: не кэшировать HTML (иначе правки ссылок/разметки «не применяются» без hard refresh)
    location = / {
        add_header Cache-Control "no-store" always;
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
