services:
  postgres:
    image: postgres:15
    container_name: raf-postgres
    environment:
      POSTGRES_DB: rafcoffee
      POSTGRES_USER: rafuser
      POSTGRES_PASSWORD: rafpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rafuser -d rafcoffee"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: raf-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: raf-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://rafuser:rafpass@postgres:5432/rafcoffee
      REDIS_URL: redis://redis:6379/0
      ADMIN_TOKEN: ${ADMIN_TOKEN:-8922}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./backend/static:/app/static
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ping')",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 25s

  # Статика меню (HTML) + прокси к API — см. frontend/nginx.conf
  frontend:
    image: nginx:alpine
    container_name: raf-frontend
    # 8080 — основной. Проброс 80:80 (http://localhost/ без :8080) вынесен в
    # docker-compose.port80.yaml, чтобы на сервере с nginx на 80 ничего не ломалось.
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data: